---
name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Send request to '...'
        2. With payload '...'
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, status codes, or logs.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Service version, commit hash, or Docker image tag."
      placeholder: "e.g. main@abc1234 or v1.0.0"

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Docker Compose (local)
        - Kubernetes
        - Bare metal
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context (screenshots, logs, config snippets).
